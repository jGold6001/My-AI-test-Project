services:
  backend:
    build: ./backend
    container_name: myownai-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - COLLECTION_NAME=myownai_docs
      - LLM_MODEL=my-model
      - EMBEDDING_MODEL=nomic-embed-text
      - VECTOR_SIZE=768
    depends_on:
      qdrant:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: myownai-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  qdrant:
    image: qdrant/qdrant:latest
    container_name: myownai-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: myownai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: myownai-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./my-model:/my-model
    entrypoint: ["/bin/sh", "-c", "ollama pull nomic-embed-text && ollama create my-model -f /my-model/Modelfile"]

volumes:
  ollama_data:
